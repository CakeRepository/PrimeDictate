name: Build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      push_only:
        description: "Skip build/sign/release and only push existing Chocolatey nupkg"
        required: false
        default: false
        type: boolean
      target_version:
        description: "Version to push in push-only mode (example: 3.2.0)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  dotnet:
    runs-on: windows-latest
    env:
      PUBLISH_DIR: ${{ github.workspace }}\artifacts\win-x64\publish
      INSTALLER_DIR: ${{ github.workspace }}\artifacts\installer
      RELEASE_ASSET_DIR: ${{ github.workspace }}\prime-dictate-release-assets
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Compute version metadata
        id: version
        shell: pwsh
        run: |
          [xml]$props = Get-Content ".\Directory.Build.props"
          $baseVersion = @($props.Project.PropertyGroup | Where-Object { $_.Version } | Select-Object -First 1).Version.Trim()
          if ([string]::IsNullOrWhiteSpace($baseVersion)) {
            throw "Directory.Build.props is missing a Version value."
          }

          $releaseTag = ""
          $isSemverTag = "false"

          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.push_only }}" -eq "true") {
            $manualVersion = "${{ inputs.target_version }}".Trim()
            if ([string]::IsNullOrWhiteSpace($manualVersion)) {
              throw "workflow_dispatch push_only=true requires target_version (for example 3.2.0)."
            }

            if ($manualVersion -notmatch '^\d+\.\d+\.\d+(-[0-9A-Za-z][0-9A-Za-z\.-]*)?$') {
              throw "target_version '$manualVersion' is not a valid package version."
            }

            $packageVersion = $manualVersion
            $informationalVersion = $manualVersion
            $releaseTag = "v$manualVersion"
            $isSemverTag = "true"
          }
          elseif ($env:GITHUB_REF -match '^refs/tags/(v\d+\.\d+\.\d+)$') {
            $releaseTag = $Matches[1]
            $packageVersion = $releaseTag.Substring(1)
            $informationalVersion = $packageVersion
            $isSemverTag = "true"
          }
          elseif ($env:GITHUB_REF -like "refs/tags/v*") {
            $packageVersion = $env:GITHUB_REF.Substring("refs/tags/v".Length)
            $informationalVersion = $packageVersion
          }
          else {
            $packageVersion = "$baseVersion-ci.$env:GITHUB_RUN_NUMBER"
            $informationalVersion = "$packageVersion+$($env:GITHUB_SHA.Substring(0,7))"
          }

          $baseParts = $baseVersion.Split(".")
          if ($baseParts.Length -lt 3) {
            throw "Base Version must be semver (e.g. 0.1.0). Found: $baseVersion"
          }

          $assemblyVersion = "$($baseParts[0]).$($baseParts[1]).$($baseParts[2]).0"
          $fileVersion = "$($baseParts[0]).$($baseParts[1]).$($baseParts[2]).$env:GITHUB_RUN_NUMBER"

          "base_version=$baseVersion" >> $env:GITHUB_OUTPUT
          "package_version=$packageVersion" >> $env:GITHUB_OUTPUT
          "assembly_version=$assemblyVersion" >> $env:GITHUB_OUTPUT
          "file_version=$fileVersion" >> $env:GITHUB_OUTPUT
          "informational_version=$informationalVersion" >> $env:GITHUB_OUTPUT
          "release_tag=$releaseTag" >> $env:GITHUB_OUTPUT
          "is_semver_tag=$isSemverTag" >> $env:GITHUB_OUTPUT

      - name: Resolve signing mode
        id: signing
        if: github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || !inputs.push_only)
        shell: pwsh
        env:
          AZURESIGNTOOL_KEYVAULT_URL: ${{ secrets.AZURESIGNTOOL_KEYVAULT_URL }}
          AZURESIGNTOOL_CLIENT_ID: ${{ secrets.AZURESIGNTOOL_CLIENT_ID }}
          AZURESIGNTOOL_TENANT_ID: ${{ secrets.AZURESIGNTOOL_TENANT_ID }}
          AZURESIGNTOOL_CLIENT_SECRET: ${{ secrets.AZURESIGNTOOL_CLIENT_SECRET }}
          AZURESIGNTOOL_CERT_NAME: ${{ secrets.AZURESIGNTOOL_CERT_NAME }}
        run: |
          $signingEnabled = -not (
            [string]::IsNullOrWhiteSpace($env:AZURESIGNTOOL_KEYVAULT_URL) -or
            [string]::IsNullOrWhiteSpace($env:AZURESIGNTOOL_CLIENT_ID) -or
            [string]::IsNullOrWhiteSpace($env:AZURESIGNTOOL_TENANT_ID) -or
            [string]::IsNullOrWhiteSpace($env:AZURESIGNTOOL_CLIENT_SECRET) -or
            [string]::IsNullOrWhiteSpace($env:AZURESIGNTOOL_CERT_NAME)
          )

          "enabled=$($signingEnabled.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

          if ($signingEnabled) {
            Write-Host "Code signing is enabled for this run."
          }
          else {
            Write-Host "Code signing secrets are not fully configured; continuing with unsigned release assets."
          }

      - name: Restore + build
        if: github.event_name != 'workflow_dispatch' || !inputs.push_only
        run: >
          dotnet build -c Release
          -p:Version=${{ steps.version.outputs.package_version }}
          -p:AssemblyVersion=${{ steps.version.outputs.assembly_version }}
          -p:FileVersion=${{ steps.version.outputs.file_version }}
          -p:InformationalVersion=${{ steps.version.outputs.informational_version }}

      - name: Publish (win-x64)
        if: github.event_name != 'workflow_dispatch' || !inputs.push_only
        shell: pwsh
        run: >
          .\scripts\Publish-Windows.ps1
          -PackageVersion "${{ steps.version.outputs.package_version }}"
          -AssemblyVersion "${{ steps.version.outputs.assembly_version }}"
          -FileVersion "${{ steps.version.outputs.file_version }}"
          -InformationalVersion "${{ steps.version.outputs.informational_version }}"

      - name: Install AzureSignTool
        if: github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || !inputs.push_only) && steps.signing.outputs.enabled == 'true'
        shell: pwsh
        run: dotnet tool install --global AzureSignTool

      - name: Sign publish payload binaries (Azure Key Vault)
        if: github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || !inputs.push_only) && steps.signing.outputs.enabled == 'true'
        shell: pwsh
        env:
          AZURESIGNTOOL_KEYVAULT_URL: ${{ secrets.AZURESIGNTOOL_KEYVAULT_URL }}
          AZURESIGNTOOL_CLIENT_ID: ${{ secrets.AZURESIGNTOOL_CLIENT_ID }}
          AZURESIGNTOOL_TENANT_ID: ${{ secrets.AZURESIGNTOOL_TENANT_ID }}
          AZURESIGNTOOL_CLIENT_SECRET: ${{ secrets.AZURESIGNTOOL_CLIENT_SECRET }}
          AZURESIGNTOOL_CERT_NAME: ${{ secrets.AZURESIGNTOOL_CERT_NAME }}
          AZURESIGNTOOL_TIMESTAMP_URL: ${{ secrets.AZURESIGNTOOL_TIMESTAMP_URL }}
        run: |
          if (
            [string]::IsNullOrWhiteSpace($env:AZURESIGNTOOL_KEYVAULT_URL) -or
            [string]::IsNullOrWhiteSpace($env:AZURESIGNTOOL_CLIENT_ID) -or
            [string]::IsNullOrWhiteSpace($env:AZURESIGNTOOL_TENANT_ID) -or
            [string]::IsNullOrWhiteSpace($env:AZURESIGNTOOL_CLIENT_SECRET) -or
            [string]::IsNullOrWhiteSpace($env:AZURESIGNTOOL_CERT_NAME)
          ) {
            throw "Signing secrets are missing. Configure AZURESIGNTOOL_* repository secrets."
          }

          $timestampUrl = if ([string]::IsNullOrWhiteSpace($env:AZURESIGNTOOL_TIMESTAMP_URL)) { "http://timestamp.globalsign.com/tsa/advanced" } else { $env:AZURESIGNTOOL_TIMESTAMP_URL }

          $filesToSign = Get-ChildItem -Path $env:PUBLISH_DIR -Include *.exe,*.dll -File -Recurse | Select-Object -ExpandProperty FullName
          if (-not $filesToSign -or $filesToSign.Count -eq 0) {
            throw "No publish payload binaries found to sign under $env:PUBLISH_DIR"
          }

          foreach ($path in $filesToSign) {
            if (-not (Test-Path $path)) {
              throw "Expected file not found for signing: $path"
            }

            azuresigntool sign `
              -kvu $env:AZURESIGNTOOL_KEYVAULT_URL `
              -kvi $env:AZURESIGNTOOL_CLIENT_ID `
              -kvt $env:AZURESIGNTOOL_TENANT_ID `
              -kvs $env:AZURESIGNTOOL_CLIENT_SECRET `
              -kvc $env:AZURESIGNTOOL_CERT_NAME `
              -tr $timestampUrl `
              -td sha256 `
              -fd sha256 `
              "$path"
          }

      - name: Build online installer
        if: github.event_name != 'workflow_dispatch' || !inputs.push_only
        shell: pwsh
        run: >
          .\scripts\Build-Installers.ps1 -Installer Online -SkipPublish
          -PackageVersion "${{ steps.version.outputs.package_version }}"
          -AssemblyVersion "${{ steps.version.outputs.assembly_version }}"
          -FileVersion "${{ steps.version.outputs.file_version }}"
          -InformationalVersion "${{ steps.version.outputs.informational_version }}"

      - name: Sign installer MSI (Azure Key Vault)
        if: github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || !inputs.push_only) && steps.signing.outputs.enabled == 'true'
        shell: pwsh
        env:
          AZURESIGNTOOL_KEYVAULT_URL: ${{ secrets.AZURESIGNTOOL_KEYVAULT_URL }}
          AZURESIGNTOOL_CLIENT_ID: ${{ secrets.AZURESIGNTOOL_CLIENT_ID }}
          AZURESIGNTOOL_TENANT_ID: ${{ secrets.AZURESIGNTOOL_TENANT_ID }}
          AZURESIGNTOOL_CLIENT_SECRET: ${{ secrets.AZURESIGNTOOL_CLIENT_SECRET }}
          AZURESIGNTOOL_CERT_NAME: ${{ secrets.AZURESIGNTOOL_CERT_NAME }}
          AZURESIGNTOOL_TIMESTAMP_URL: ${{ secrets.AZURESIGNTOOL_TIMESTAMP_URL }}
        run: |
          if (
            [string]::IsNullOrWhiteSpace($env:AZURESIGNTOOL_KEYVAULT_URL) -or
            [string]::IsNullOrWhiteSpace($env:AZURESIGNTOOL_CLIENT_ID) -or
            [string]::IsNullOrWhiteSpace($env:AZURESIGNTOOL_TENANT_ID) -or
            [string]::IsNullOrWhiteSpace($env:AZURESIGNTOOL_CLIENT_SECRET) -or
            [string]::IsNullOrWhiteSpace($env:AZURESIGNTOOL_CERT_NAME)
          ) {
            throw "Signing secrets are missing. Configure AZURESIGNTOOL_* repository secrets."
          }

          $timestampUrl = if ([string]::IsNullOrWhiteSpace($env:AZURESIGNTOOL_TIMESTAMP_URL)) { "http://timestamp.globalsign.com/tsa/advanced" } else { $env:AZURESIGNTOOL_TIMESTAMP_URL }
          $msis = Get-ChildItem -Path $env:INSTALLER_DIR -Filter *.msi -File -ErrorAction SilentlyContinue
          if (-not $msis -or $msis.Count -eq 0) {
            throw "No MSI files found to sign under $env:INSTALLER_DIR"
          }

          foreach ($msi in $msis) {
            azuresigntool sign `
              -kvu $env:AZURESIGNTOOL_KEYVAULT_URL `
              -kvi $env:AZURESIGNTOOL_CLIENT_ID `
              -kvt $env:AZURESIGNTOOL_TENANT_ID `
              -kvs $env:AZURESIGNTOOL_CLIENT_SECRET `
              -kvc $env:AZURESIGNTOOL_CERT_NAME `
              -tr $timestampUrl `
              -td sha256 `
              -fd sha256 `
              "$($msi.FullName)"
          }

      - name: Upload build artifacts
        if: always() && (github.event_name != 'workflow_dispatch' || !inputs.push_only)
        uses: actions/upload-artifact@v4
        with:
          name: prime-dictate-win-x64-${{ steps.version.outputs.package_version }}
          path: |
            artifacts/win-x64/publish/**
            artifacts/installer/*.msi
            artifacts/installer/*.nupkg

      - name: Prepare GitHub release assets
        if: github.event_name == 'push' && steps.version.outputs.is_semver_tag == 'true' && (github.event_name != 'workflow_dispatch' || !inputs.push_only)
        id: release_assets
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.release_tag }}"
          $assetDir = $env:RELEASE_ASSET_DIR
          $expectedOnlineMsi = Join-Path $env:INSTALLER_DIR "PrimeDictate-${{ steps.version.outputs.package_version }}-Windows-Online.msi"
          $expectedChocolateyNupkg = Join-Path $env:INSTALLER_DIR "primedictate.${{ steps.version.outputs.package_version }}.nupkg"

          Remove-Item -Path $assetDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $assetDir | Out-Null

          if (-not (Test-Path $expectedOnlineMsi)) {
            throw "Expected online MSI not found for release upload: $expectedOnlineMsi"
          }
          if (-not (Test-Path $expectedChocolateyNupkg)) {
            throw "Expected Chocolatey package not found for release upload: $expectedChocolateyNupkg"
          }

          $releaseMsiPath = Join-Path $assetDir "PrimeDictate-Setup-$tag.msi"
          $releaseNupkgPath = Join-Path $assetDir "primedictate.${{ steps.version.outputs.package_version }}.nupkg"

          Copy-Item -Path $expectedOnlineMsi -Destination $releaseMsiPath -Force
          Copy-Item -Path $expectedChocolateyNupkg -Destination $releaseNupkgPath -Force

          $msiHash = (Get-FileHash -Path $releaseMsiPath -Algorithm SHA256).Hash.ToLowerInvariant()
          $nupkgHash = (Get-FileHash -Path $releaseNupkgPath -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -Path (Join-Path $assetDir "PrimeDictate-Setup-$tag.msi.sha256") -Value "$msiHash  PrimeDictate-Setup-$tag.msi" -NoNewline
          Set-Content -Path (Join-Path $assetDir "primedictate.${{ steps.version.outputs.package_version }}.nupkg.sha256") -Value "$nupkgHash  primedictate.${{ steps.version.outputs.package_version }}.nupkg" -NoNewline

          "asset_dir=$assetDir" >> $env:GITHUB_OUTPUT

      - name: Publish installers to GitHub Release
        if: github.event_name == 'push' && steps.version.outputs.is_semver_tag == 'true' && (github.event_name != 'workflow_dispatch' || !inputs.push_only)
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.version.outputs.release_tag }}"
          $repo = "${{ github.repository }}"
          $assetDir = "${{ steps.release_assets.outputs.asset_dir }}"
          $assets = Get-ChildItem -Path $assetDir -File | Sort-Object Name | Select-Object -ExpandProperty FullName

          if (-not $assets -or $assets.Count -eq 0) {
            throw "No prepared release assets found under $assetDir"
          }

          & gh release view $tag --repo $repo *> $null
          if ($LASTEXITCODE -ne 0) {
            & gh release create $tag --repo $repo --title $tag --generate-notes
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create GitHub release for tag $tag"
            }
          }

          & gh release upload $tag $assets --repo $repo --clobber
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to upload release assets for tag $tag"
          }

      - name: Resolve Chocolatey nupkg for push-only mode
        if: github.event_name == 'workflow_dispatch' && inputs.push_only
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ steps.version.outputs.package_version }}"
          $tag = "${{ steps.version.outputs.release_tag }}"
          $assetName = "primedictate.$version.nupkg"
          $outDir = $env:INSTALLER_DIR
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          & gh release download $tag --repo "${{ github.repository }}" --pattern $assetName --dir $outDir --clobber
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to download $assetName from release $tag."
          }

          $nupkgPath = Join-Path $outDir $assetName
          if (-not (Test-Path $nupkgPath)) {
            throw "Downloaded nupkg not found at $nupkgPath"
          }

      - name: Push Chocolatey package (optional)
        if: (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push_only)) && steps.version.outputs.is_semver_tag == 'true'
        shell: pwsh
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
          CHOCO_SOURCE_URL: ${{ vars.CHOCO_SOURCE_URL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CHOCO_API_KEY)) {
            Write-Host "CHOCO_API_KEY is not configured; skipping Chocolatey push."
            exit 0
          }

          $nupkgPath = Join-Path $env:INSTALLER_DIR "primedictate.${{ steps.version.outputs.package_version }}.nupkg"
          if (-not (Test-Path $nupkgPath)) {
            throw "Chocolatey package not found for push: $nupkgPath"
          }

          $sourceUrl = if ([string]::IsNullOrWhiteSpace($env:CHOCO_SOURCE_URL)) { "https://push.chocolatey.org/" } else { $env:CHOCO_SOURCE_URL.Trim() }
          choco push $nupkgPath --source $sourceUrl --api-key $env:CHOCO_API_KEY --timeout 2700
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "Chocolatey push failed with exit code $LASTEXITCODE. GitHub release assets were already published, so the optional Chocolatey publishing step will not fail the release build."
            exit 0
          }
